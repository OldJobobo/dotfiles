# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # No gaps between windows
    # gaps_in = 5
    # gaps_out = 8
    # border_size = 4
    # Use master layout instead of dwindle
    # layout = master
    allow_tearing = true
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
    # rounding = 5
    # active_opacity=0.95
    # inactive_opacity=0.89

    
}

# https://wiki.hypr.land/Configuring/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}

# Do not pass mouse wheel events to apps when a wheel bind is triggered.
binds {
  pass_mouse_when_bound = false
  scroll_event_delay = 0
}

# Work around oversized/block cursor artifacts on rotated monitors.
cursor {
  no_hardware_cursors = true
}

#windowrule = match:class steam, tile on
windowrule = float true, match:class ^(steam)$
windowrule = float false, match:class ^(steam)$, match:title ^(Steam)$
windowrule = float true, size 370 680, move 1530 50, match:class ^(steam)$, match:title ^(Friends\ List)$

windowrule {
  name = ws4-floating-defaults

  match:workspace = 4

  float  = true
  size   = (monitor_w*0.60) (monitor_h*0.60)
  center = true
}

# Override Omarchy About/Fastfetch floating window size.
windowrule = tag -floating-window, match:class ^org\.omarchy\.bash$
windowrule = float true, size 1350 800, center on, match:class ^org\.omarchy\.bash$

# BUT: make Brave fully opaque even if global opacity is on

windowrule {
  name = windowrule-1
  opacity = 1.0 override 1.0 override 1.0 override
  match:class = brave-browser
}

# Keep GIMP fully opaque even when global opacity rules apply.
windowrule = tag -default-opacity, match:class ^(gimp)$
windowrule = opacity 1 1, match:class ^(gimp)$

# Dialogs override
windowrule {
  name = windowrule-2
  size = 800 600
  match:title = ^(Open|Save|Export|Preferences|Color Selector)$
}


windowrule = tag +terminal, match:class (foot|footclient)
