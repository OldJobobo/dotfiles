# Extra autostart processes
# exec-once = uwsm-app -- my-service
# exec-once = launch

exec-once = hyprpm reload -n
exec-once = systemctl --user start awww-daemon.service
exec-once = hyprctl dispatch exec "[workspace special:scratchpad silent] omarchy-launch-tui btop"
exec-once = bash -lc 'sleep 1; pkill -x mako >/dev/null 2>&1 || true; exec uwsm-app -- swaync'
